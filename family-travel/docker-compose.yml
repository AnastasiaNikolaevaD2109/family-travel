version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: familytravel
      POSTGRES_USER: family
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DB_NAME: familytravel
      DB_USER: family
      DB_PASSWORD: secret
      DB_HOST: db
    volumes:
      - media_volume:/app/media
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_volume:
